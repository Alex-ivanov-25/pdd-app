name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}
          restore-keys: node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      - name: Patch Podfile (awk)
        run: |
          awk '
            /post_install do \|installer\|/ { in_post=1 }
            in_post && /^  end$/ {
              print "    installer.pods_project.targets.each do |target|"
              print "      target.build_configurations.each do |config|"
              print "        config.build_settings[\"SWIFT_VERSION\"] = \"5\""
              print "        config.build_settings[\"SWIFT_STRICT_CONCURRENCY\"] = \"minimal\""
              print "        config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"13.0\""
              print "        config.build_settings[\"OTHER_SWIFT_FLAGS\"] = \"-Xfrontend -disable-actor-data-race-checks\""
              print "      end"
              print "    end"
              in_post=0
            }
            { print }
          ' ios/Podfile > ios/Podfile.tmp && mv ios/Podfile.tmp ios/Podfile
          tail -20 ios/Podfile

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Patch xcconfig files
        run: |
          find ios/Pods -name "*.xcconfig" | while read f; do
            sed -i '' 's/SWIFT_VERSION = 6/SWIFT_VERSION = 5/g' "$f"
            grep -q "SWIFT_VERSION" "$f" || echo "SWIFT_VERSION = 5" >> "$f"
            grep -q "SWIFT_STRICT_CONCURRENCY" "$f" || echo "SWIFT_STRICT_CONCURRENCY = minimal" >> "$f"
          done
          echo "✅ xcconfig patched"

      - name: Patch Protobuf Swift files
        run: |
          F1="ios/Pods/Protobuf/objectivec/GPBUnknownField+Additions.swift"
          F2="ios/Pods/Protobuf/objectivec/GPBUnknownFields+Additions.swift"
          # Заменяем extension на @preconcurrency extension
          sed -i '' 's/^extension GPBUnknownField {/@preconcurrency extension GPBUnknownField {/g' "$F1"
          sed -i '' 's/^extension GPBUnknownFields {/@preconcurrency extension GPBUnknownFields {/g' "$F2"
          sed -i '' 's/^extension GPBUnknownFields: Sequence {/@preconcurrency extension GPBUnknownFields: Sequence {/g' "$F2"
          echo "✅ Protobuf patched"
          grep "extension GPB" "$F1" "$F2"

      - name: Find workspace
        run: |
          cd ios
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1 | xargs basename)
          SCHEME=$(echo $WORKSPACE | sed 's/.xcworkspace//')
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "✅ Found: $WORKSPACE"

      - name: Build IPA
        run: |
          cd ios
          set -o pipefail
          xcodebuild \
            -workspace ${{ env.WORKSPACE }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/app.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            OTHER_SWIFT_FLAGS="-Xfrontend -disable-actor-data-race-checks" \
            2>&1 | tail -50

          mkdir -p build/Payload
          cp -r build/app.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r ../app.ipa Payload/
          echo "✅ IPA: $(du -sh ../app.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: pdd-ipa
          path: ios/app.ipa
          retention-days: 7
