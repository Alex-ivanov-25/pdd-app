name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      # ─── Кеш node_modules ──────────────────────────────────
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}
          restore-keys: node-

      # ─── Кеш CocoaPods ─────────────────────────────────────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      # ─── Патч Podfile: отключаем Swift 6 во всех подах ─────
      - name: Patch Podfile for Swift 5
        run: |
          cat >> ios/Podfile << 'EOF'

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['SWIFT_VERSION'] = '5'
                config.build_settings['SWIFT_STRICT_CONCURRENCY'] = 'minimal'
                config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '13.0'
              end
            end
          end
          EOF

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Find workspace and scheme
        run: |
          cd ios
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1 | xargs basename)
          SCHEME=$(echo $WORKSPACE | sed 's/.xcworkspace//')
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "Found: $WORKSPACE / $SCHEME"

      - name: Build IPA
        run: |
          cd ios
          xcodebuild \
            -workspace ${{ env.WORKSPACE }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/app.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            | xcpretty --color || true

          # Проверяем что архив создался
          ls -la build/
          ls -la build/app.xcarchive/Products/Applications/ || echo "No .app found"

          # Упаковываем в .ipa
          mkdir -p build/Payload
          cp -r build/app.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r ../app.ipa Payload/
          echo "IPA size: $(du -sh ../app.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: pdd-ipa
          path: ios/app.ipa
          retention-days: 7
