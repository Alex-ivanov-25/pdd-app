name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-${{ hashFiles('package-lock.json') }}
          restore-keys: node-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      - name: Show Podfile
        run: cat ios/Podfile

      - name: Patch Podfile (awk)
        run: |
          # post_install заканчивается на '  end' (с двумя пробелами, внутри target блока)
          awk '
            /post_install do \|installer\|/ { in_post=1 }
            in_post && /^  end$/ {
              print "    installer.pods_project.targets.each do |target|"
              print "      target.build_configurations.each do |config|"
              print "        config.build_settings[\"SWIFT_VERSION\"] = \"5\""
              print "        config.build_settings[\"SWIFT_STRICT_CONCURRENCY\"] = \"minimal\""
              print "        config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"13.0\""
              print "      end"
              print "    end"
              in_post=0
            }
            { print }
          ' ios/Podfile > ios/Podfile.tmp && mv ios/Podfile.tmp ios/Podfile
          echo "--- Patched Podfile (last 20 lines) ---"
          tail -20 ios/Podfile

      - name: Install CocoaPods
        run: cd ios && pod install

      - name: Find workspace
        run: |
          cd ios
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1 | xargs basename)
          SCHEME=$(echo $WORKSPACE | sed 's/.xcworkspace//')
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV
          echo "✅ Found: $WORKSPACE"

      - name: Build IPA
        run: |
          cd ios
          set -o pipefail
          xcodebuild \
            -workspace ${{ env.WORKSPACE }} \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/app.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_VERSION=5 \
            SWIFT_STRICT_CONCURRENCY=minimal \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            2>&1 | tail -50

          mkdir -p build/Payload
          cp -r build/app.xcarchive/Products/Applications/*.app build/Payload/
          cd build && zip -r ../app.ipa Payload/
          echo "✅ IPA: $(du -sh ../app.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: pdd-ipa
          path: ios/app.ipa
          retention-days: 7
